<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>李佳轩 · 作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f7fb;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 2rem 1rem;
            color: #1e2a3a;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .name {
            font-size: 2.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e2a3a, #2c3e50);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .tagline {
            font-size: 1rem;
            color: #5a6e7c;
            border-top: 1px solid #e2e8f0;
            display: inline-block;
            padding-top: 0.5rem;
        }
        .home-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }
        .home-card {
            background: white;
            border-radius: 28px;
            padding: 2rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.05);
            border: 1px solid #edf2f7;
        }
        .home-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.15);
        }
        .home-emoji {
            font-size: 3.5rem;
        }
        .home-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0.5rem 0;
        }
        .welcome {
            text-align: center;
            font-size: 1.6rem;
            margin: 1rem 0;
        }
        .module-nav {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .module-nav-btn {
            background: transparent;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .module-nav-btn.active {
            background: #1e2a3a;
            color: white;
        }
        .module-content {
            background: white;
            border-radius: 28px;
            padding: 2rem;
            min-height: 500px;
        }
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }
        .project-card {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            cursor: pointer;
            border: 1px solid #edf2f7;
            transition: 0.2s;
        }
        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -8px rgba(0,0,0,0.1);
        }
        .pdf-hint {
            margin-top: 1rem;
            font-size: 0.75rem;
            color: #7f8c8d;
            border-top: 1px solid #eef2ff;
            padding-top: 0.75rem;
        }
        .coming-soon {
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
        }
        .footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="name">李佳轩 · Jiaxuan Li</div>
        <div class="tagline">城市规划 | 生态环境 | 设计研究</div>
    </div>

    <div id="homePage">
        <div class="welcome">✨ 您希望从哪里了解我？ ✨</div>
        <div class="home-grid">
            <div class="home-card" data-module="paper"><div class="home-emoji">📄</div><div class="home-title">论文</div><div>学术研究成果 · 已发表论文</div></div>
            <div class="home-card" data-module="urban"><div class="home-emoji">🏙️</div><div class="home-title">城市设计</div><div>设计作品 · 城市 / 乡村</div></div>
            <div class="home-card" data-module="photo"><div class="home-emoji">📸</div><div class="home-title">摄影</div><div>城市 · 自然 · 人文影像</div></div>
            <div class="home-card" data-module="sketch"><div class="home-emoji">✍️</div><div class="home-title">手绘</div><div>钢笔淡彩 · 马克笔表现</div></div>
        </div>
    </div>

    <div id="moduleArea" style="display: none;">
        <div class="module-nav">
            <button class="module-nav-btn" data-module="home">🏠 首页</button>
            <button class="module-nav-btn" data-module="paper">📄 论文</button>
            <button class="module-nav-btn" data-module="urban">🏙️ 城市设计</button>
            <button class="module-nav-btn" data-module="photo">📸 摄影</button>
            <button class="module-nav-btn" data-module="sketch">✍️ 手绘</button>
        </div>
        <div class="module-content" id="moduleContent"></div>
    </div>

    <div class="footer">© 李佳轩 · Portfolio</div>
</div>

<script>
    // 论文数据（请修改为实际PDF路径）
    const papersData = [
        { title: "水库消落带植物多样性空间格局预测模型", authors: "刘瑞雪, 李佳轩, 李云", journal: "生态学报", year: "2024", pdfUrl: "papers/reservoir_diversity.pdf" },
        { title: "中国立体绿化政策发展与量化评价", authors: "刘瑞雪, 李佳轩, 严仙友阳", journal: "中国城市林业", year: "2025", pdfUrl: "papers/green_policy.pdf" }
    ];

    // 城市设计项目
    const urbanProjects = [
        { title: "🎣 渔米", location: "广东省 · 中山市 · 南朗镇", desc: "渔村振兴与生态景观设计", pdfUrl: "pdfs/yumi.pdf" },
        { title: "🌸 春雨桃花，淮北佳处", location: "江苏省 · 徐州市 · 新沂市", desc: "乡村文旅与产业规划", pdfUrl: "pdfs/chunyu_taohua.pdf" },
        { title: "🌳 文杏栽为梁，香茅结为宇", location: "江苏省 · 南京市 · 雨花台区", desc: "城市新生活住宅设计", pdfUrl: "pdfs/wenxing_xiangmao.pdf" },
        { title: "🐉 新样小团龙", location: "江苏省 · 南京市 · 溧水区", desc: "文化公共空间营造", pdfUrl: "pdfs/xinyang_tuanlong.pdf" }
    ];

    function getModuleHTML(module) {
        if (module === 'paper') {
            return '<div class="projects-grid">' + papersData.map(function(p) {
                return '<div class="project-card" data-pdf="' + p.pdfUrl + '">' +
                    '<div><strong>📄 ' + escapeHtml(p.title) + '</strong></div>' +
                    '<div>👥 ' + escapeHtml(p.authors) + '</div>' +
                    '<div>' + escapeHtml(p.journal) + ' · ' + escapeHtml(p.year) + '</div>' +
                    '<div class="pdf-hint">📄 点击卡片查看PDF</div>' +
                    '</div>';
            }).join('') + '</div>';
        } else if (module === 'urban') {
            return '<div class="projects-grid">' + urbanProjects.map(function(p) {
                return '<div class="project-card" data-pdf="' + p.pdfUrl + '">' +
                    '<div><strong>' + escapeHtml(p.title) + '</strong></div>' +
                    '<div>📍 ' + escapeHtml(p.location) + '</div>' +
                    '<div>' + escapeHtml(p.desc) + '</div>' +
                    '<div class="pdf-hint">📄 点击卡片查看设计PDF</div>' +
                    '</div>';
            }).join('') + '</div>';
        } else if (module === 'sketch') {
            return '<div class="coming-soon">✍️ 手绘模块 · 建设中</div>';
        } else if (module === 'photo') {
            return '<div class="coming-soon">📸 摄影模块 · 建设中</div>';
        }
        return '';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function attachCardEvents() {
        var cards = document.querySelectorAll('.project-card');
        for (var i = 0; i < cards.length; i++) {
            var card = cards[i];
            var oldHandler = card._handler;
            if (oldHandler) card.removeEventListener('click', oldHandler);
            var url = card.getAttribute('data-pdf');
            var handler = function(e) {
                var pdfUrl = this.getAttribute('data-pdf');
                if (pdfUrl) window.open(pdfUrl, '_blank');
                else alert('PDF路径未配置');
            };
            card.addEventListener('click', handler);
            card._handler = handler;
        }
    }

    function showModule(moduleName) {
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('moduleArea').style.display = 'block';
        document.getElementById('moduleContent').innerHTML = getModuleHTML(moduleName);
        attachCardEvents();
        var btns = document.querySelectorAll('.module-nav-btn');
        for (var i = 0; i < btns.length; i++) {
            var btn = btns[i];
            if (btn.getAttribute('data-module') === moduleName) btn.classList.add('active');
            else btn.classList.remove('active');
        }
    }

    function showHome() {
        document.getElementById('homePage').style.display = 'block';
        document.getElementById('moduleArea').style.display = 'none';
    }

    var homeCards = document.querySelectorAll('.home-card');
    for (var i = 0; i < homeCards.length; i++) {
        homeCards[i].addEventListener('click', function(e) {
            var module = this.getAttribute('data-module');
            if (module) showModule(module);
        });
    }

    var navBtns = document.querySelectorAll('.module-nav-btn');
    for (var i = 0; i < navBtns.length; i++) {
        navBtns[i].addEventListener('click', function(e) {
            var module = this.getAttribute('data-module');
            if (module === 'home') showHome();
            else if (module) showModule(module);
        });
    }
</script>
</body>
</html>
