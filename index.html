    const nextBtn = document.getElementById('nextBtn');
    const backBtn = document.getElementById('backBtn');
    const closeModalSpan = document.querySelector('.close-modal');
    const loadingOverlay = document.getElementById('loadingOverlay');

    function showLoading() { loadingOverlay.style.display = 'flex'; }
    function hideLoading() { loadingOverlay.style.display = 'none'; }

    function setImageWithLoading(imgElement, src, onSuccess) {
        showLoading();
        imgElement.onload = () => { hideLoading(); if (onSuccess) onSuccess(); };
        imgElement.onerror = () => { hideLoading(); alert('图片加载失败，请稍后重试'); };
        imgElement.src = src;
    }

    // 通用打开图片查看器（支持三种类型）
    function openImageViewer(images, startIndex, type = 'urban') {
        if (type === 'urban') {
            currentImageList = images;
            currentIndex = startIndex;
            backBtn.style.display = 'none';
        } else if (type === 'photo') {
            currentPhotoList = images;
            currentPhotoIndex = startIndex;
            backBtn.style.display = 'none';
        } else if (type === 'sketch') {
            currentSketchList = images;
            currentSketchIndex = startIndex;
            backBtn.style.display = 'none';
        }
        modal.style.display = 'block';
        updateModalImage(type);
    }

    function updateModalImage(type = 'urban') {
        let list, idx;
        if (type === 'urban') { list = currentImageList; idx = currentIndex; }
        else if (type === 'photo') { list = currentPhotoList; idx = currentPhotoIndex; }
        else { list = currentSketchList; idx = currentSketchIndex; }
        if (list && list.length > 0 && idx >= 0 && idx < list.length) {
            setImageWithLoading(modalImg, list[idx], () => {
                if (idx === 0) prevBtn.style.visibility = 'hidden';
                else prevBtn.style.visibility = 'visible';
                if (idx === list.length - 1) {
                    nextBtn.style.visibility = 'hidden';
                    if (type === 'urban') {
                        backBtn.style.display = 'block';
                        backBtn.innerText = '← 返回城市设计模块';
                    } else {
                        backBtn.style.display = 'none';
                    }
                } else {
                    nextBtn.style.visibility = 'visible';
                    backBtn.style.display = 'none';
                }
            });
        }
    }

    function nextImage() {
        if (currentImageList.length > 0 && currentIndex < currentImageList.length - 1) {
            currentIndex++; updateModalImage('urban');
        } else if (currentPhotoList.length > 0 && currentPhotoIndex < currentPhotoList.length - 1) {
            currentPhotoIndex++; updateModalImage('photo');
        } else if (currentSketchList.length > 0 && currentSketchIndex < currentSketchList.length - 1) {
            currentSketchIndex++; updateModalImage('sketch');
        }
    }

    function prevImage() {
        if (currentImageList.length > 0 && currentIndex > 0) { currentIndex--; updateModalImage('urban'); }
        else if (currentPhotoList.length > 0 && currentPhotoIndex > 0) { currentPhotoIndex--; updateModalImage('photo'); }
        else if (currentSketchList.length > 0 && currentSketchIndex > 0) { currentSketchIndex--; updateModalImage('sketch'); }
    }

    function closeAndBackToUrban() {
        modal.style.display = 'none';
        const homePage = document.getElementById('homePage');
        const moduleArea = document.getElementById('moduleArea');
        if (homePage && moduleArea) {
            if (homePage.style.display !== 'none') showModuleView('urban');
            else {
                const activeNav = document.querySelector('.module-nav-btn.active');
                if (!activeNav || activeNav.getAttribute('data-module') !== 'urban') showModuleView('urban');
            }
        }
        currentImageList = [];
        currentPhotoList = [];
        currentSketchList = [];
    }

    function closeModal() {
        modal.style.display = 'none';
        currentImageList = [];
        currentPhotoList = [];
        currentSketchList = [];
        hideLoading();
    }

    prevBtn.onclick = prevImage;
    nextBtn.onclick = nextImage;
    closeModalSpan.onclick = closeModal;
    backBtn.onclick = closeAndBackToUrban;
    window.onclick = (event) => { if (event.target == modal) closeModal(); };

    // ================= 模块内容生成 =================
    function getModuleHTML(moduleName) {
        if (moduleName === 'paper') {
            let html = '<div class="projects-grid">';
            for (let p of papersData) {
                html += `
                    <div class="project-card" data-pdf="${p.pdfUrl}">
                        <img class="card-thumb" src="${escapeHtml(p.thumbUrl)}" alt="代表图">
                        <div class="project-title">📄 ${escapeHtml(p.title)}</div>
                        <div class="project-authors">👥 ${escapeHtml(p.authors)}</div>
                        <div class="project-meta">
                            <span class="project-journal">${escapeHtml(p.journal)}</span>
                            <span class="project-if">${escapeHtml(p.ifInfo)}</span>
                            <span class="project-year">${escapeHtml(p.year)}</span>
                        </div>
                        <div class="pdf-hint"><span>📄 点击卡片查看PDF全文</span><div class="slow-tip">⏱️ 第一次打开卡片会有些慢，请耐心等待哦~</div></div>
                    </div>
                `;
            }
            html += '</div>';
            return html;
        } else if (moduleName === 'urban') {
            let html = '<div class="projects-grid">';
            for (let proj of urbanProjects) {
                const pageCount = proj.images.length;
                html += `
                    <div class="project-card" data-images='${JSON.stringify(proj.images)}' data-title="${escapeHtml(proj.title)}">
                        <img class="card-thumb" src="${escapeHtml(proj.thumbUrl)}" alt="代表图">
                        <div class="project-title">${proj.emoji} ${escapeHtml(proj.title)}</div>
                        <div class="project-location">📍 ${escapeHtml(proj.location)}</div>
                        <div class="project-desc">${escapeHtml(proj.description)}</div>
                        <div class="pdf-hint">
                            <span>🖼️ 点击卡片查看设计图（可翻页）</span>
                            <div style="margin-top: 0.3rem;">📄 共 ${pageCount} 页</div>
                            <div class="slow-tip">⏱️ 翻页时图片加载会比较慢，请耐心等待哦~</div>
                        </div>
                    </div>
                `;
            }
            html += '</div>';
            return html;
        } else if (moduleName === 'photo') {
            // 摄影模块瀑布流（保持不变）
            let masonryHtml = '<div class="masonry">';
            for (let i = 0; i < photoItems.length; i++) {
                const item = photoItems[i];
                masonryHtml += `
                    <div class="masonry-item" data-photo-index="${i}">
                        <img src="${escapeHtml(item.src)}" alt="${escapeHtml(item.caption)}" loading="lazy">
                        <div class="masonry-caption">${escapeHtml(item.caption)}</div>
                    </div>
                `;
            }
            masonryHtml += '</div><div class="slow-tip" style="text-align:center; margin-top:1rem;">📸 点击任意图片可放大预览</div>';
            return masonryHtml;
        } else if (moduleName === 'sketch') {
            // 手绘模块 - 画廊轮播
            const allSrcs = sketchItems.map(item => item.src);
            // 轮播 HTML
            let carouselHtml = `
                <div class="gallery-carousel" id="sketchCarousel">
                    <div class="carousel-container" id="carouselContainer">
                        <img id="carouselMainImage" class="carousel-image" src="${escapeHtml(sketchItems[0].src)}" alt="手绘作品">
                        <button class="carousel-arrow prev-arrow" id="carouselPrev">❮</button>
                        <button class="carousel-arrow next-arrow" id="carouselNext">❯</button>
                    </div>
                    <div class="carousel-caption">
                        <div class="carousel-title" id="carouselTitle">${escapeHtml(sketchItems[0].title)}</div>
                        <div class="carousel-size" id="carouselSize">${escapeHtml(sketchItems[0].size)}</div>
                        <div class="carousel-caption-text" id="carouselCaption">${escapeHtml(sketchItems[0].caption)}</div>
                    </div>
                    <div class="carousel-dots" id="carouselDots">
                        ${sketchItems.map((_, idx) => `<div class="dot ${idx === 0 ? 'active' : ''}" data-index="${idx}"></div>`).join('')}
                    </div>
                </div>
                <div class="slow-tip" style="text-align:center; margin-top:1rem;">✍️ 点击图片可放大预览 | 左右箭头切换</div>
            `;
            return carouselHtml;
        }
        return '<div class="coming-soon">内容加载中...</div>';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 初始化手绘轮播（在渲染后调用）
    let currentSketchCarouselIndex = 0;
    function initSketchCarousel() {
        const container = document.getElementById('carouselContainer');
        const img = document.getElementById('carouselMainImage');
        const prevBtnCar = document.getElementById('carouselPrev');
        const nextBtnCar = document.getElementById('carouselNext');
        const dots = document.querySelectorAll('#carouselDots .dot');
        const titleEl = document.getElementById('carouselTitle');
        const sizeEl = document.getElementById('carouselSize');
        const captionEl = document.getElementById('carouselCaption');

        if (!container || !img) return;

        function updateCarousel(index) {
            const item = sketchItems[index];
            if (!item) return;
            // 带加载提示切换图片
            setImageWithLoading(img, item.src, () => {});
            titleEl.innerText = item.title;
            sizeEl.innerText = item.size;
            captionEl.innerText = item.caption;
            // 更新点状态
            dots.forEach((dot, i) => {
                if (i === index) dot.classList.add('active');
                else dot.classList.remove('active');
            });
            currentSketchCarouselIndex = index;
        }

        function next() {
            let newIndex = currentSketchCarouselIndex + 1;
            if (newIndex >= sketchItems.length) newIndex = 0;
            updateCarousel(newIndex);
        }
        function prev() {
            let newIndex = currentSketchCarouselIndex - 1;
            if (newIndex < 0) newIndex = sketchItems.length - 1;
            updateCarousel(newIndex);
        }

        prevBtnCar.onclick = prev;
        nextBtnCar.onclick = next;
        dots.forEach(dot => {
            dot.onclick = () => {
                const idx = parseInt(dot.getAttribute('data-index'));
                if (!isNaN(idx)) updateCarousel(idx);
            };
        });
        // 点击图片放大预览
        img.onclick = () => {
            const allSrcs = sketchItems.map(item => item.src);
            openImageViewer(allSrcs, currentSketchCarouselIndex, 'sketch');
        };
    }

    function attachCardEvents() {
        // 论文卡片
        const paperCards = document.querySelectorAll('.project-card[data-pdf]');
        paperCards.forEach(card => {
            card.removeEventListener('click', card._handler);
            const pdfPath = card.getAttribute('data-pdf');
            const handler = (e) => {
                if (e.target.classList && e.target.classList.contains('card-thumb')) return;
                e.stopPropagation();
                if (pdfPath) window.open(pdfPath, '_blank');
                else alert('PDF地址无效');
            };
            card.addEventListener('click', handler);
            card._handler = handler;
        });

        // 城市设计卡片
        const urbanCards = document.querySelectorAll('.project-card[data-images]');
        urbanCards.forEach(card => {
            card.removeEventListener('click', card._urbanHandler);
            const imagesAttr = card.getAttribute('data-images');
            const handler = (e) => {
                if (e.target.classList && e.target.classList.contains('card-thumb')) return;
                e.stopPropagation();
                if (imagesAttr) {
                    try {
                        const images = JSON.parse(imagesAttr);
                        if (images && images.length) openImageViewer(images, 0, 'urban');
                        else alert('该作品暂无图片');
                    } catch(e) { alert('图片数据错误'); }
                }
            };
            card.addEventListener('click', handler);
            card._urbanHandler = handler;
        });

        // 摄影瀑布流
        const photoItemsDom = document.querySelectorAll('.masonry-item');
        photoItemsDom.forEach(item => {
            item.removeEventListener('click', item._photoHandler);
            const idx = parseInt(item.getAttribute('data-photo-index'));
            const handler = () => {
                const allPhotoSrcs = photoItems.map(p => p.src);
                openImageViewer(allPhotoSrcs, idx, 'photo');
            };
            item.addEventListener('click', handler);
            item._photoHandler = handler;
        });

        // 手绘轮播初始化（如果存在）
        if (document.getElementById('sketchCarousel')) {
            initSketchCarousel();
        }
    }

    function showModuleView(moduleName) {
        const homePage = document.getElementById('homePage');
        const moduleArea = document.getElementById('moduleArea');
        if (!homePage || !moduleArea) return;
        const navBtns = document.querySelectorAll('.module-nav-btn');
        navBtns.forEach(btn => {
            if (btn.getAttribute('data-module') === moduleName) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        const contentDiv = document.getElementById('moduleContent');
        if (contentDiv) {
            contentDiv.innerHTML = getModuleHTML(moduleName);
            attachCardEvents();
        }
        homePage.style.display = 'none';
        moduleArea.style.display = 'block';
    }

    function showHome() {
        document.getElementById('homePage').style.display = 'block';
        document.getElementById('moduleArea').style.display = 'none';
        closeModal();
    }

    function init() {
        document.querySelectorAll('.home-card').forEach(card => {
            card.addEventListener('click', () => {
                const module = card.getAttribute('data-module');
                if (module) showModuleView(module);
            });
        });
        document.querySelectorAll('.module-nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const module = btn.getAttribute('data-module');
                if (module === 'home') showHome();
                else if (module) showModuleView(module);
            });
        });
        document.getElementById('homePage').style.display = 'block';
        document.getElementById('moduleArea').style.display = 'none';
    }
    init();
</script>
</body>
</html>
