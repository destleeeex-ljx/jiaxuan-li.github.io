<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>李佳轩 · 作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            color: #1e2a3a;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .name {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #1e2a3a, #2c3e50);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .tagline {
            font-size: 1rem;
            color: #5a6e7c;
            margin-top: 0.5rem;
            border-top: 1px solid #e2e8f0;
            display: inline-block;
            padding-top: 0.5rem;
        }

        /* 首页四大板块网格 */
        .home-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }
        .home-card {
            background: white;
            border-radius: 28px;
            padding: 2rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.05), 0 0 0 1px #f0f2f5;
            border: 1px solid #edf2f7;
        }
        .home-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.15);
            border-color: #cbd5e1;
        }
        .home-emoji {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }
        .home-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #1e2a3a;
        }
        .home-desc {
            font-size: 0.9rem;
            color: #5a6e7c;
        }
        .welcome {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 500;
            color: #2c3e50;
            margin: 1rem 0 0.5rem;
        }

        /* 模块顶部导航栏 */
        .module-nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #e2e8f0;
        }
        .module-nav-btn {
            background: transparent;
            border: none;
            padding: 0.5rem 1.2rem;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #4a5b6e;
            font-family: inherit;
        }
        .module-nav-btn:hover {
            background: #e9edf2;
            color: #1e2a3a;
        }
        .module-nav-btn.active {
            background: #1e2a3a;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* 模块内容区 */
        .module-content {
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03), 0 2px 6px rgba(0,0,0,0.05);
            padding: 2rem 1.8rem;
            min-height: 500px;
        }

        /* 通用卡片网格 */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 1rem;
        }
        .project-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.05), 0 0 0 1px #f0f2f5;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid #edf2f7;
        }
        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.12);
            border-color: #cbd5e1;
        }
        .project-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0f172a;
            line-height: 1.4;
            margin-bottom: 0.5rem;
        }
        .project-location {
            font-size: 0.85rem;
            color: #4b5563;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .project-desc {
            font-size: 0.85rem;
            color: #2d3a46;
            margin: 0.5rem 0;
            font-style: italic;
        }
        .pdf-hint {
            margin-top: 1rem;
            font-size: 0.75rem;
            color: #7f8c8d;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            border-top: 1px solid #ecfdf5;
            padding-top: 0.75rem;
        }
        .pdf-hint span {
            background: #f1f5f9;
            padding: 0.2rem 0.5rem;
            border-radius: 30px;
        }

        .coming-soon {
            text-align: center;
            padding: 3rem 1rem;
            color: #94a3b8;
            font-size: 1.1rem;
        }
        .placeholder-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }
        .placeholder-item {
            background: #f8fafc;
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            flex: 1;
            min-width: 150px;
            color: #475569;
            border: 1px dashed #cbd5e1;
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #7c8b9c;
        }

        @media (max-width: 640px) {
            body { padding: 1rem; }
            .module-content { padding: 1.5rem; }
            .project-title { font-size: 1rem; }
            .home-title { font-size: 1.4rem; }
            .welcome { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="name">李佳轩 · Jiaxuan Li</div>
        <div class="tagline">城市规划 | 生态环境 | 设计研究</div>
    </div>

    <!-- 首页：四大板块 -->
    <div id="homePage">
        <div class="welcome">✨ 您希望从哪里了解我？ ✨</div>
        <div class="home-grid">
            <div class="home-card" data-module="paper">
                <div class="home-emoji">📄</div>
                <div class="home-title">论文</div>
                <div class="home-desc">学术研究成果 · 已发表论文</div>
            </div>
            <div class="home-card" data-module="urban">
                <div class="home-emoji">🏙️</div>
                <div class="home-title">城市设计</div>
                <div class="home-desc">设计作品 · 城市 / 乡村</div>
            </div>
            <div class="home-card" data-module="photo">
                <div class="home-emoji">📸</div>
                <div class="home-title">摄影</div>
                <div class="home-desc">城市 · 自然 · 人文影像</div>
            </div>
            <div class="home-card" data-module="sketch">
                <div class="home-emoji">✍️</div>
                <div class="home-title">手绘</div>
                <div class="home-desc">钢笔淡彩 · 马克笔表现</div>
            </div>
        </div>
    </div>

    <!-- 模块区域（含导航栏 + 内容，初始隐藏） -->
    <div id="moduleArea" style="display: none;">
        <div class="module-nav" id="moduleNav">
            <button class="module-nav-btn" data-module="home">🏠 首页</button>
            <button class="module-nav-btn" data-module="paper">📄 论文</button>
            <button class="module-nav-btn" data-module="urban">🏙️ 城市设计</button>
            <button class="module-nav-btn" data-module="photo">📸 摄影</button>
            <button class="module-nav-btn" data-module="sketch">✍️ 手绘</button>
        </div>
        <div class="module-content" id="moduleContent">
            <!-- 动态内容会填充到这里 -->
        </div>
    </div>

    <div class="footer">
        © 李佳轩 · Portfolio
    </div>
</div>

<script>
    // ================= 论文数据 =================
    const papersData = [
        {
            title: "水库消落带植物多样性空间格局预测模型及环境解释 —— 基于XGBoost-SHAP模型框架",
            authors: "刘瑞雪, 李佳轩, 李云",
            journal: "生态学报",
            year: "2024, 44(21): 9652-9669",
            pdfUrl: "papers/reservoir_diversity.pdf"   // 请修改为实际路径
        },
        {
            title: "中国立体绿化政策发展与量化评价",
            authors: "刘瑞雪, 李佳轩, 严仙友阳",
            journal: "中国城市林业",
            year: "2025, 23(01): 179-187",
            pdfUrl: "papers/green_policy.pdf"          // 请修改为实际路径
        }
    ];

    // ================= 城市设计项目数据 =================
    // 请将每个项目的 PDF 文件放入 pdfs/ 文件夹，并修改下面的 pdfUrl 路径
    const urbanProjects = [
        {
            title: "渔米",
            location: "广东省 · 中山市 · 南朗镇",
            description: "滨水渔村振兴与生态景观设计",
            pdfUrl: "pdfs/yumi.pdf"   // 请替换为实际PDF路径
        },
        {
            title: "春雨桃花，淮北佳处",
            location: "江苏省 · 徐州市 · 新沂市",
            description: "乡村文旅规划与景观营造",
            pdfUrl: "pdfs/chunyu_taohua.pdf"
        },
        {
            title: "文杏栽为梁，香茅结为宇",
            location: "江苏省 · 南京市 · 雨花台区",
            description: "历史街区更新与公共空间设计",
            pdfUrl: "pdfs/wenxing_xiangmao.pdf"
        },
        {
            title: "新样小团龙",
            location: "江苏省 · 南京市 · 溧水区",
            description: "文化地标与社区微更新",
            pdfUrl: "pdfs/xinyang_tuanlong.pdf"
        }
    ];

    // ================= 模块内容生成 =================
    function getModuleHTML(moduleName) {
        if (moduleName === 'paper') {
            let cardsHtml = `<div class="projects-grid">`;
            for (let p of papersData) {
                cardsHtml += `
                    <div class="project-card" data-pdf="${p.pdfUrl}">
                        <div class="project-title">📄 ${escapeHtml(p.title)}</div>
                        <div class="project-location">👥 ${escapeHtml(p.authors)}</div>
                        <div class="project-desc">${escapeHtml(p.journal)} · ${escapeHtml(p.year)}</div>
                        <div class="pdf-hint">
                            <span>📄 点击卡片查看PDF全文</span>
                        </div>
                    </div>
                `;
            }
            cardsHtml += `</div>`;
            return cardsHtml;
        } 
        else if (moduleName === 'urban') {
            let cardsHtml = `<div class="projects-grid">`;
            for (let proj of urbanProjects) {
                cardsHtml += `
                    <div class="project-card" data-pdf="${proj.pdfUrl}">
                        <div class="project-title">🏙️ ${escapeHtml(proj.title)}</div>
                        <div class="project-location">📍 ${escapeHtml(proj.location)}</div>
                        <div class="project-desc">${escapeHtml(proj.description)}</div>
                        <div class="pdf-hint">
                            <span>📄 点击卡片查看设计PDF</span>
                        </div>
                    </div>
                `;
            }
            cardsHtml += `</div>`;
            return cardsHtml;
        }
        else if (moduleName === 'sketch') {
            return `
                <div class="coming-soon">
                    ✍️ 手绘模块 · 速写/建筑/景观手绘<br>
                    <div class="placeholder-grid">
                        <div class="placeholder-item">钢笔淡彩</div>
                        <div class="placeholder-item">马克笔表现</div>
                    </div>
                    <p style="margin-top:1rem; font-size:0.85rem;">手绘作品扫描整理中，敬请期待</p>
                </div>
            `;
        }
        else if (moduleName === 'photo') {
            return `
                <div class="coming-soon">
                    📸 摄影模块 · 城市/自然/人文<br>
                    <div class="placeholder-grid">
                        <div class="placeholder-item">城市天际线</div>
                        <div class="placeholder-item">生态纪实</div>
                    </div>
                    <p style="margin-top:1rem; font-size:0.85rem;">摄影集即将上线</p>
                </div>
            `;
        }
        return '<div class="coming-soon">内容加载中...</div>';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 通用卡片点击打开 PDF
    function attachCardEvents() {
        const cards = document.querySelectorAll('.project-card');
        cards.forEach(card => {
            card.removeEventListener('click', card._handler);
            const pdfPath = card.getAttribute('data-pdf');
            const handler = (e) => {
                e.stopPropagation();
                if (pdfPath && pdfPath.trim() !== '' && !pdfPath.includes('placeholder')) {
                    window.open(pdfPath, '_blank');
                } else {
                    alert('📄 PDF 文件路径未配置。请检查对应项目的 pdfUrl，并确保 PDF 文件已上传到正确的文件夹。');
                }
            };
            card.addEventListener('click', handler);
            card._handler = handler;
        });
    }

    // 显示模块视图
    function showModuleView(moduleName) {
        const homePage = document.getElementById('homePage');
        const moduleArea = document.getElementById('moduleArea');
        if (!homePage || !moduleArea) return;
        
        // 更新导航栏激活状态
        const navBtns = document.querySelectorAll('.module-nav-btn');
        navBtns.forEach(btn => {
            if (btn.getAttribute('data-module') === moduleName) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
        
        // 渲染模块内容
        const contentDiv = document.getElementById('moduleContent');
        if (contentDiv) {
            contentDiv.innerHTML = getModuleHTML(moduleName);
            attachCardEvents();  // 绑定所有卡片的点击事件
        }
        
        // 切换显示
        homePage.style.display = 'none';
        moduleArea.style.display = 'block';
    }

    // 返回首页
    function showHome() {
        const homePage = document.getElementById('homePage');
        const moduleArea = document.getElementById('moduleArea');
        if (homePage && moduleArea) {
            homePage.style.display = 'block';
            moduleArea.style.display = 'none';
        }
    }

    // 初始化
    function init() {
        // 首页卡片点击
        const cards = document.querySelectorAll('.home-card');
        cards.forEach(card => {
            card.addEventListener('click', () => {
                const module = card.getAttribute('data-module');
                if (module) showModuleView(module);
            });
        });
        
        // 导航栏按钮点击
        const navBtns = document.querySelectorAll('.module-nav-btn');
        navBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const module = btn.getAttribute('data-module');
                if (module === 'home') {
                    showHome();
                } else {
                    showModuleView(module);
                }
            });
        });
        
        // 初始显示首页
        document.getElementById('homePage').style.display = 'block';
        document.getElementById('moduleArea').style.display = 'none';
    }
    
    init();
</script>
</body>
</html>
