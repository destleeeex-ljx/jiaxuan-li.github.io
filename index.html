<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>李佳轩 · 作品集</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f7fb; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; padding: 2rem 1rem; color: #1e2a3a; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 2rem; }
        .name { font-size: 2.2rem; font-weight: 600; background: linear-gradient(135deg, #1e2a3a, #2c3e50); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .tagline { font-size: 1rem; color: #5a6e7c; border-top: 1px solid #e2e8f0; display: inline-block; padding-top: 0.5rem; }
        .home-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 2rem; margin: 2rem 0; }
        .home-card { background: white; border-radius: 28px; padding: 2rem 1.5rem; text-align: center; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px -5px rgba(0,0,0,0.05); border: 1px solid #edf2f7; }
        .home-card:hover { transform: translateY(-6px); box-shadow: 0 20px 30px -12px rgba(0,0,0,0.15); }
        .home-emoji { font-size: 3.5rem; margin-bottom: 1rem; }
        .home-title { font-size: 1.8rem; font-weight: 600; margin-bottom: 0.5rem; color: #1e2a3a; }
        .home-desc { font-size: 0.9rem; color: #5a6e7c; }
        .welcome { text-align: center; font-size: 1.6rem; margin: 1rem 0 0.5rem; }
        .module-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.75rem; margin-bottom: 2rem; border-bottom: 1px solid #e2e8f0; padding-bottom: 0.5rem; }
        .module-nav-btn { background: transparent; border: none; padding: 0.5rem 1.2rem; border-radius: 40px; cursor: pointer; font-size: 0.95rem; font-weight: 500; transition: 0.2s; color: #4a5b6e; }
        .module-nav-btn:hover { background: #e9edf2; color: #1e2a3a; }
        .module-nav-btn.active { background: #1e2a3a; color: white; }
        .module-content { background: white; border-radius: 28px; padding: 2rem; min-height: 500px; }
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; }
        
        /* 城市设计卡片样式（支持右上角大图） */
        .project-card {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            cursor: pointer;
            border: 1px solid #edf2f7;
            transition: 0.2s;
            position: relative;
        }
        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -8px rgba(0,0,0,0.1);
        }
        /* 右上角装饰图片（不可点击） */
        .card-thumb {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 16px;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            pointer-events: none;
            transition: none;
        }
        /* 卡片文字内容区域，避免被图片遮挡 */
        .project-card .project-title,
        .project-card .project-location,
        .project-card .project-desc,
        .project-card .pdf-hint {
            padding-right: 110px;
        }
        /* 移动端小图尺寸稍小 */
        @media (max-width: 640px) {
            .card-thumb {
                width: 70px;
                height: 70px;
                top: 0.8rem;
                right: 0.8rem;
            }
            .project-card .project-title,
            .project-card .project-location,
            .project-card .project-desc,
            .project-card .pdf-hint {
                padding-right: 85px;
            }
        }

        .project-title { font-size: 1.25rem; font-weight: 700; color: #0f172a; margin-bottom: 0.5rem; }
        .project-authors, .project-location { font-size: 0.9rem; font-weight: 500; color: #334155; margin-bottom: 0.4rem; }
        .project-meta { font-size: 0.85rem; color: #475569; margin: 0.5rem 0; display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: baseline; }
        .project-journal { font-weight: 500; }
        .project-if { background: #eef2ff; padding: 0.1rem 0.5rem; border-radius: 20px; font-size: 0.7rem; font-weight: 500; color: #1e40af; }
        .project-year { color: #5a6e7c; }
        .project-desc { font-size: 0.85rem; color: #4b5563; font-style: italic; margin: 0.5rem 0; }
        .pdf-hint { margin-top: 1rem; font-size: 0.7rem; color: #7f8c8d; border-top: 1px solid #eef2ff; padding-top: 0.75rem; text-align: center; }
        .slow-tip { font-size: 0.7rem; color: #e67e22; background: #fef3e2; display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px; margin-top: 0.5rem; }
        .coming-soon { text-align: center; padding: 3rem; color: #94a3b8; }
        .placeholder-grid { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; margin-top: 1rem; }
        .placeholder-item { background: #f8fafc; border-radius: 20px; padding: 2rem; text-align: center; flex: 1; min-width: 150px; color: #475569; border: 1px dashed #cbd5e1; }
        .footer { text-align: center; margin-top: 2rem; font-size: 0.75rem; color: #7c8b9c; }

        /* 摄影模块 - 瀑布流样式 */
        .masonry {
            column-count: 3;
            column-gap: 1.5rem;
        }
        .masonry-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .masonry-item:hover {
            transform: translateY(-4px);
        }
        .masonry-item img {
            width: 100%;
            border-radius: 20px;
            display: block;
            box-shadow: 0 6px 14px rgba(0,0,0,0.1);
            transition: box-shadow 0.2s;
        }
        .masonry-item img:hover {
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }
        .masonry-caption {
            padding: 0.5rem 0.5rem 0 0.5rem;
            font-size: 0.8rem;
            color: #4b5563;
            text-align: center;
        }
        @media (max-width: 768px) {
            .masonry { column-count: 2; }
        }
        @media (max-width: 480px) {
            .masonry { column-count: 1; }
        }

        /* 图片弹窗样式 */
        .image-modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); overflow: auto; }
        .image-modal-content { position: relative; margin: auto; top: 50%; transform: translateY(-50%); max-width: 90%; max-height: 90%; text-align: center; }
        .image-modal-content img { max-width: 100%; max-height: 80vh; border-radius: 12px; box-shadow: 0 0 20px rgba(0,0,0,0.3); }
        .close-modal { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; font-weight: bold; cursor: pointer; z-index: 1001; }
        .close-modal:hover { color: #ccc; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: white; border: none; font-size: 2rem; padding: 0.5rem 1rem; cursor: pointer; border-radius: 50%; }
        .nav-btn:hover { background: rgba(0,0,0,0.9); }
        .prev-btn { left: 20px; }
        .next-btn { right: 20px; }
        .back-to-urban { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e2a3a; color: white; border: none; padding: 0.6rem 1.5rem; border-radius: 40px; cursor: pointer; font-size: 0.9rem; }
        @media (max-width: 640px) { .nav-btn { font-size: 1.5rem; } .back-to-urban { bottom: 15px; padding: 0.4rem 1rem; } .close-modal { top: 10px; right: 20px; font-size: 30px; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="name">李佳轩 · Jiaxuan Li</div>
        <div class="tagline">城市规划 | 学术研究 | 个人爱好</div>
    </div>

    <div id="homePage">
        <div class="welcome">✨ 您希望从哪里了解我？ ✨</div>
        <div class="home-grid">
            <div class="home-card" data-module="paper"><div class="home-emoji">📄</div><div class="home-title">论文</div><div>学术研究成果 · 已发表论文</div></div>
            <div class="home-card" data-module="urban"><div class="home-emoji">🏙️</div><div class="home-title">城市设计</div><div>设计作品 · 城市 / 乡村</div></div>
            <div class="home-card" data-module="photo"><div class="home-emoji">📸</div><div class="home-title">摄影</div><div>城市 · 人文影像</div></div>
            <div class="home-card" data-module="sketch"><div class="home-emoji">✍️</div><div class="home-title">手绘</div><div>板绘 · 国画 / 油画</div></div>
        </div>
    </div>

    <div id="moduleArea" style="display: none;">
        <div class="module-nav">
            <button class="module-nav-btn" data-module="home">🏠 首页</button>
            <button class="module-nav-btn" data-module="paper">📄 论文</button>
            <button class="module-nav-btn" data-module="urban">🏙️ 城市设计</button>
            <button class="module-nav-btn" data-module="photo">📸 摄影</button>
            <button class="module-nav-btn" data-module="sketch">✍️ 手绘</button>
        </div>
        <div class="module-content" id="moduleContent"></div>
    </div>

    <div class="footer">© 李佳轩 · Portfolio</div>
</div>

<!-- 全局图片预览模态框 -->
<div id="imageModal" class="image-modal">
    <span class="close-modal">&times;</span>
    <div class="image-modal-content">
        <img id="modalImage" src="" alt="预览">
        <button id="prevBtn" class="nav-btn prev-btn">❮</button>
        <button id="nextBtn" class="nav-btn next-btn">❯</button>
        <button id="backBtn" class="back-to-urban" style="display: none;">← 返回城市设计模块</button>
    </div>
</div>

<script>
    // ================= 论文数据（使用 jsDelivr CDN） =================
    const papersData = [
        {
            title: "水库消落带植物多样性空间格局预测模型及环境解释 —— 基于XGBoost-SHAP模型框架",
            authors: "刘瑞雪, 李佳轩, 李云",
            journal: "生态学报",
            year: "2024, 44(21): 9652-9669",
            ifInfo: "IF=6.5, C核",
            pdfUrl: "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/papers/reservoir_diversity.pdf"
        },
        {
            title: "中国立体绿化政策发展与量化评价",
            authors: "刘瑞雪, 李佳轩, 严仙友阳",
            journal: "中国城市林业",
            year: "2025, 23(01): 179-187",
            ifInfo: "IF=2.1",
            pdfUrl: "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/papers/green_policy.pdf"
        }
    ];

    // ================= 城市设计项目数据（图片使用 jsDelivr CDN） =================
    const urbanProjects = [
        {
            title: "渔米",
            location: "广东省 · 中山市 · 南朗镇",
            description: "渔村振兴与生态景观设计",
            emoji: "🎣",
            images: [
                "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/designjpgs/yumi/yumi01.jpg",
                "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/designjpgs/yumi/yumi02.jpg",
                "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/designjpgs/yumi/yumi03.jpg",
                "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/designjpgs/yumi/yumi04.jpg"
            ],
            thumbUrl: "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/designjpgs/yumi/yumi02.jpg"
        },
        {
            title: "春雨桃花，淮北佳处",
            location: "江苏省 · 徐州市 · 新沂市",
            description: "乡村文旅与产业规划",
            emoji: "🌸",
            images: [
                "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/designjpgs/chunyu_taohua/1.jpg",
                "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/designjpgs/chunyu_taohua/2.jpg",
                "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/designjpgs/chunyu_taohua/3.jpg",
                "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/designjpgs/chunyu_taohua/4.jpg"
            ],
            thumbUrl: "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/designjpgs/chunyu_taohua/3.jpg"
        },
        {
            title: "文杏栽为梁，香茅结为宇",
            location: "江苏省 · 南京市 · 雨花台区",
            description: "城市新生活住宅设计",
            emoji: "🌳",
            images: [
                "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/designjpgs/wenxing_xiangmao/1.jpg",
                "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/designjpgs/wenxing_xiangmao/2.jpg",
                "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/designjpgs/wenxing_xiangmao/3.jpg",
                "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/designjpgs/wenxing_xiangmao/4.jpg",
                "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/designjpgs/wenxing_xiangmao/5.jpg"
            ],
            thumbUrl: "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/designjpgs/wenxing_xiangmao/2.jpg"
        },
        {
            title: "新样小团龙",
            location: "江苏省 · 南京市 · 溧水区",
            description: "城市公共文化设施营造",
            emoji: "🐉",
            images: [
                "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/designjpgs/xinyang_tuanlong/1.jpg",
                "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/designjpgs/xinyang_tuanlong/2.jpg",
                "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/designjpgs/xinyang_tuanlong/3.jpg",
                "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/designjpgs/xinyang_tuanlong/4.jpg",
                "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/designjpgs/xinyang_tuanlong/5.jpg"
            ],
            thumbUrl: "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/designjpgs/xinyang_tuanlong/4.jpg"
        }
    ];

    // ================= 摄影模块数据（图片使用 jsDelivr CDN） =================
    const photoItems = [
        { src: "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/photography/1.jpg", caption: "寄畅 · 无锡" },
        { src: "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/photography/2.jpg", caption: "太平山顶 · 香港" },
        { src: "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/photography/3.jpg", caption: "交汇 · 上海" },
        { src: "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/photography/4.jpg", caption: "孤舟 · 深圳" },
        { src: "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/photography/7.jpg", caption: "山海 · 深圳" },
        { src: "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/photography/5.jpg", caption: "湾区之眼 · 深圳" },
        { src: "https://cdn.jsdelivr.net/gh/destleeeex-ljx/jiaxuan-li.github.io@main/photography/6.jpg", caption: "或许你喜欢吃东西吗" }
    ];

    // 图片浏览逻辑（不变）
    let currentImageList = [];
    let currentIndex = 0;
    let currentProjectTitle = "";
    let currentPhotoList = [];
    let currentPhotoIndex = 0;

    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const backBtn = document.getElementById('backBtn');
    const closeModalSpan = document.querySelector('.close-modal');

    function openImageViewer(images, startIndex, type = 'urban') {
        if (type === 'urban') {
            currentImageList = images;
            currentIndex = startIndex;
            currentProjectTitle = "";
            backBtn.style.display = 'none';
        } else {
            currentPhotoList = images;
            currentPhotoIndex = startIndex;
            backBtn.style.display = 'none';
        }
        modal.style.display = 'block';
        updateModalImage(type);
    }

    function updateModalImage(type = 'urban') {
        let list, idx;
        if (type === 'urban') {
            list = currentImageList;
            idx = currentIndex;
        } else {
            list = currentPhotoList;
            idx = currentPhotoIndex;
        }
        if (list && list.length > 0 && idx >= 0 && idx < list.length) {
            modalImg.src = list[idx];
            if (idx === 0) prevBtn.style.visibility = 'hidden';
            else prevBtn.style.visibility = 'visible';
            if (idx === list.length - 1) {
                nextBtn.style.visibility = 'hidden';
                if (type === 'urban') {
                    backBtn.style.display = 'block';
                    backBtn.innerText = '← 返回城市设计模块';
                } else {
                    backBtn.style.display = 'none';
                }
            } else {
                nextBtn.style.visibility = 'visible';
                backBtn.style.display = 'none';
            }
        }
    }

    function nextImage() {
        if (currentImageList.length > 0 && currentIndex < currentImageList.length - 1) {
            currentIndex++;
            updateModalImage('urban');
        } else if (currentPhotoList.length > 0 && currentPhotoIndex < currentPhotoList.length - 1) {
            currentPhotoIndex++;
            updateModalImage('photo');
        }
    }

    function prevImage() {
        if (currentImageList.length > 0 && currentIndex > 0) {
            currentIndex--;
            updateModalImage('urban');
        } else if (currentPhotoList.length > 0 && currentPhotoIndex > 0) {
            currentPhotoIndex--;
            updateModalImage('photo');
        }
    }

    function closeAndBackToUrban() {
        modal.style.display = 'none';
        const homePage = document.getElementById('homePage');
        const moduleArea = document.getElementById('moduleArea');
        if (homePage && moduleArea) {
            if (homePage.style.display !== 'none') showModuleView('urban');
            else {
                const activeNav = document.querySelector('.module-nav-btn.active');
                if (!activeNav || activeNav.getAttribute('data-module') !== 'urban') showModuleView('urban');
            }
        }
        currentImageList = [];
        currentPhotoList = [];
    }

    function closeModal() {
        modal.style.display = 'none';
        currentImageList = [];
        currentPhotoList = [];
    }

    prevBtn.onclick = prevImage;
    nextBtn.onclick = nextImage;
    closeModalSpan.onclick = closeModal;
    backBtn.onclick = closeAndBackToUrban;
    window.onclick = (event) => { if (event.target == modal) closeModal(); };

    // ================= 模块内容生成 =================
    function getModuleHTML(moduleName) {
        if (moduleName === 'paper') {
            let html = '<div class="projects-grid">';
            for (let p of papersData) {
                html += `
                    <div class="project-card" data-pdf="${p.pdfUrl}">
                        <div class="project-title">📄 ${escapeHtml(p.title)}</div>
                        <div class="project-authors">👥 ${escapeHtml(p.authors)}</div>
                        <div class="project-meta">
                            <span class="project-journal">${escapeHtml(p.journal)}</span>
                            <span class="project-if">${escapeHtml(p.ifInfo)}</span>
                            <span class="project-year">${escapeHtml(p.year)}</span>
                        </div>
                        <div class="pdf-hint"><span>📄 点击卡片查看PDF全文</span><div class="slow-tip">⏱️ 第一次打开卡片会有些慢，请耐心等待哦~</div></div>
                    </div>
                `;
            }
            html += '</div>';
            return html;
        } else if (moduleName === 'urban') {
            let html = '<div class="projects-grid">';
            for (let proj of urbanProjects) {
                const pageCount = proj.images.length;
                html += `
                    <div class="project-card" data-images='${JSON.stringify(proj.images)}' data-title="${escapeHtml(proj.title)}">
                        <img class="card-thumb" src="${escapeHtml(proj.thumbUrl)}" alt="代表图" title="">
                        <div class="project-title">${proj.emoji} ${escapeHtml(proj.title)}</div>
                        <div class="project-location">📍 ${escapeHtml(proj.location)}</div>
                        <div class="project-desc">${escapeHtml(proj.description)}</div>
                        <div class="pdf-hint">
                            <span>🖼️ 点击卡片查看设计图（可翻页）</span>
                            <div style="margin-top: 0.3rem;">📄 共 ${pageCount} 页</div>
                            <div class="slow-tip">⏱️ 翻页时图片加载会比较快~</div>
                        </div>
                    </div>
                `;
            }
            html += '</div>';
            return html;
        } else if (moduleName === 'photo') {
            let masonryHtml = '<div class="masonry">';
            for (let i = 0; i < photoItems.length; i++) {
                const item = photoItems[i];
                masonryHtml += `
                    <div class="masonry-item" data-photo-index="${i}">
                        <img src="${escapeHtml(item.src)}" alt="${escapeHtml(item.caption)}" loading="lazy">
                        <div class="masonry-caption">${escapeHtml(item.caption)}</div>
                    </div>
                `;
            }
            masonryHtml += '</div><div class="slow-tip" style="text-align:center; margin-top:1rem;">📸 点击任意图片可放大预览</div>';
            return masonryHtml;
        } else if (moduleName === 'sketch') {
            return '<div class="coming-soon">✍️ 手绘模块 · 建设中</div>';
        }
        return '<div class="coming-soon">内容加载中...</div>';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function attachCardEvents() {
        const cards = document.querySelectorAll('.project-card');
        cards.forEach(card => {
            card.removeEventListener('click', card._handler);
            const pdfPath = card.getAttribute('data-pdf');
            const imagesAttr = card.getAttribute('data-images');
            const handler = (e) => {
                if (e.target.classList && e.target.classList.contains('card-thumb')) return;
                e.stopPropagation();
                if (pdfPath) window.open(pdfPath, '_blank');
                else if (imagesAttr) {
                    try {
                        const images = JSON.parse(imagesAttr);
                        if (images && images.length) openImageViewer(images, 0, 'urban');
                        else alert('该作品暂无图片');
                    } catch(e) { alert('图片数据错误'); }
                } else alert('内容未配置');
            };
            card.addEventListener('click', handler);
            card._handler = handler;
        });

        const photoItemsDom = document.querySelectorAll('.masonry-item');
        photoItemsDom.forEach(item => {
            item.removeEventListener('click', item._photoHandler);
            const idx = parseInt(item.getAttribute('data-photo-index'));
            const handler = () => {
                const allPhotoSrcs = photoItems.map(p => p.src);
                openImageViewer(allPhotoSrcs, idx, 'photo');
            };
            item.addEventListener('click', handler);
            item._photoHandler = handler;
        });
    }

    function showModuleView(moduleName) {
        const homePage = document.getElementById('homePage');
        const moduleArea = document.getElementById('moduleArea');
        if (!homePage || !moduleArea) return;
        const navBtns = document.querySelectorAll('.module-nav-btn');
        navBtns.forEach(btn => {
            if (btn.getAttribute('data-module') === moduleName) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        const contentDiv = document.getElementById('moduleContent');
        if (contentDiv) {
            contentDiv.innerHTML = getModuleHTML(moduleName);
            attachCardEvents();
        }
        homePage.style.display = 'none';
        moduleArea.style.display = 'block';
    }

    function showHome() {
        document.getElementById('homePage').style.display = 'block';
        document.getElementById('moduleArea').style.display = 'none';
        closeModal();
    }

    function init() {
        document.querySelectorAll('.home-card').forEach(card => {
            card.addEventListener('click', () => {
                const module = card.getAttribute('data-module');
                if (module) showModuleView(module);
            });
        });
        document.querySelectorAll('.module-nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const module = btn.getAttribute('data-module');
                if (module === 'home') showHome();
                else if (module) showModuleView(module);
            });
        });
        document.getElementById('homePage').style.display = 'block';
        document.getElementById('moduleArea').style.display = 'none';
    }
    init();
</script>
</body>
</html>
