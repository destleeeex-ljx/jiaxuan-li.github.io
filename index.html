<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>李佳轩 · 作品集</title>
    <!-- 引入 PDF.js 的 CSS 样式，让翻页阅读器显示更美观 -->
    <link rel="resource" type="application/l10n" href="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/web/locale/locale.properties">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/web/pdf_viewer.css">
    <style>
        /* --- 你的原始样式全部保留，此处不变，只新增了用于PDF弹窗的modal样式 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f7fb;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 2rem 1rem;
            color: #1e2a3a;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 2rem; }
        .name {
            font-size: 2.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1e2a3a, #2c3e50);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .tagline {
            font-size: 1rem;
            color: #5a6e7c;
            border-top: 1px solid #e2e8f0;
            display: inline-block;
            padding-top: 0.5rem;
        }
        .home-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }
        .home-card {
            background: white;
            border-radius: 28px;
            padding: 2rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.05);
            border: 1px solid #edf2f7;
        }
        .home-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.15);
        }
        .home-emoji { font-size: 3.5rem; }
        .home-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin: 0.5rem 0;
        }
        .welcome {
            text-align: center;
            font-size: 1.6rem;
            margin: 1rem 0;
        }
        .module-nav {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .module-nav-btn {
            background: transparent;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: 0.2s;
        }
        .module-nav-btn:hover { background: #e9edf2; }
        .module-nav-btn.active {
            background: #1e2a3a;
            color: white;
        }
        .module-content {
            background: white;
            border-radius: 28px;
            padding: 2rem;
            min-height: 500px;
        }
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }
        .project-card {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            cursor: pointer;
            border: 1px solid #edf2f7;
            transition: 0.2s;
        }
        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -8px rgba(0,0,0,0.1);
        }
        /* 统一字体层级 */
        .project-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }
        .project-authors, .project-location {
            font-size: 0.9rem;
            font-weight: 500;
            color: #334155;
            margin-bottom: 0.4rem;
        }
        .project-meta {
            font-size: 0.85rem;
            color: #475569;
            margin: 0.5rem 0;
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            align-items: baseline;
        }
        .project-journal { font-weight: 500; }
        .project-if {
            background: #eef2ff;
            padding: 0.1rem 0.5rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #1e40af;
        }
        .project-year { color: #5a6e7c; }
        .project-desc {
            font-size: 0.85rem;
            color: #4b5563;
            font-style: italic;
            margin: 0.5rem 0;
        }
        .pdf-hint {
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #7f8c8d;
            border-top: 1px solid #eef2ff;
            padding-top: 0.75rem;
            text-align: center;
        }
        .coming-soon {
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
        }
        .footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.75rem;
        }
        /* --- PDF 弹窗样式 --- */
        .pdf-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.8);
        }
        .pdf-modal-content {
            background-color: #fefefe;
            margin: 2% auto;
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            height: 90%;
            display: flex;
            flex-direction: column;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .close-btn {
            color: #aaa;
            align-self: flex-end;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .close-btn:hover,
        .close-btn:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
        .pdf-iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        @media (max-width: 640px) {
            .home-title { font-size: 1.4rem; }
            .welcome { font-size: 1.3rem; }
            .project-title { font-size: 1.1rem; }
            .pdf-modal-content { width: 95%; margin: 5% auto; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="name">李佳轩 · Jiaxuan Li</div>
        <div class="tagline">城市规划 | 生态环境 | 设计研究</div>
    </div>

    <div id="homePage">
        <div class="welcome">✨ 您希望从哪里了解我？ ✨</div>
        <div class="home-grid">
            <div class="home-card" data-module="paper"><div class="home-emoji">📄</div><div class="home-title">论文</div><div>学术研究成果 · 已发表论文</div></div>
            <div class="home-card" data-module="urban"><div class="home-emoji">🏙️</div><div class="home-title">城市设计</div><div>设计作品 · 城市 / 乡村</div></div>
            <div class="home-card" data-module="photo"><div class="home-emoji">📸</div><div class="home-title">摄影</div><div>城市 · 自然 · 人文影像</div></div>
            <div class="home-card" data-module="sketch"><div class="home-emoji">✍️</div><div class="home-title">手绘</div><div>钢笔淡彩 · 马克笔表现</div></div>
        </div>
    </div>

    <div id="moduleArea" style="display: none;">
        <div class="module-nav">
            <button class="module-nav-btn" data-module="home">🏠 首页</button>
            <button class="module-nav-btn" data-module="paper">📄 论文</button>
            <button class="module-nav-btn" data-module="urban">🏙️ 城市设计</button>
            <button class="module-nav-btn" data-module="photo">📸 摄影</button>
            <button class="module-nav-btn" data-module="sketch">✍️ 手绘</button>
        </div>
        <div class="module-content" id="moduleContent"></div>
    </div>

    <div class="footer">© 李佳轩 · Portfolio</div>
</div>

<!-- PDF 预览弹窗 -->
<div id="pdfModal" class="pdf-modal">
    <div class="pdf-modal-content">
        <span class="close-btn">&times;</span>
        <iframe id="pdfIframe" class="pdf-iframe" src=""></iframe>
    </div>
</div>

<!-- 引入 PDF.js 库，用于翻页效果 -->
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/build/pdf.min.js"></script>
<script>
    // --- 数据配置 ---
    const papersData = [
        { 
            title: "水库消落带植物多样性空间格局预测模型及环境解释 —— 基于XGBoost-SHAP模型框架", 
            authors: "刘瑞雪, 李佳轩, 李云", 
            journal: "生态学报", 
            year: "2024",
            ifInfo: "IF=6.5, C核",
            pdfUrl: "https://destleeeex-ljx.github.io/jiaxuan-li.github.io/papers/reservoir_diversity.pdf" 
        },
        { 
            title: "中国立体绿化政策发展与量化评价", 
            authors: "刘瑞雪, 李佳轩, 严仙友阳", 
            journal: "中国城市林业", 
            year: "2025",
            ifInfo: "IF=2.1",
            pdfUrl: "https://destleeeex-ljx.github.io/jiaxuan-li.github.io/papers/green_policy.pdf" 
        }
    ];

    // 城市设计项目数据（PDF 链接已改为 GitHub 上文件的直接链接）
    const urbanProjects = [
        { title: "🎣 渔米", location: "广东省 · 中山市 · 南朗镇", desc: "渔村振兴与生态景观设计", pdfUrl: "https://destleeeex-ljx.github.io/jiaxuan-li.github.io/designpdfs/yumi.pdf" },
        { title: "🌸 春雨桃花，淮北佳处", location: "江苏省 · 徐州市 · 新沂市", desc: "乡村文旅与产业规划", pdfUrl: "https://destleeeex-ljx.github.io/jiaxuan-li.github.io/pdfs/chunyu_taohua.pdf" },
        { title: "🌳 文杏栽为梁，香茅结为宇", location: "江苏省 · 南京市 · 雨花台区", desc: "城市新生活住宅设计", pdfUrl: "https://destleeeex-ljx.github.io/jiaxuan-li.github.io/pdfs/wenxing_xiangmao.pdf" },
        { title: "🐉 新样小团龙", location: "江苏省 · 南京市 · 溧水区", desc: "城市文化公共空间营造", pdfUrl: "https://destleeeex-ljx.github.io/jiaxuan-li.github.io/pdfs/xinyang_tuanlong.pdf" }
    ];

    // --- 辅助函数：HTML 转义 ---
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // --- 模块内容生成器（保持不变，因为我们已经将 pdfUrl 更新为了绝对链接）---
    function getModuleHTML(module) {
        if (module === 'paper') {
            let html = '<div class="projects-grid">';
            for (let p of papersData) {
                html += `
                    <div class="project-card" data-pdf="${escapeHtml(p.pdfUrl)}">
                        <div class="project-title">📄 ${escapeHtml(p.title)}</div>
                        <div class="project-authors">👥 ${escapeHtml(p.authors)}</div>
                        <div class="project-meta">
                            <span class="project-journal">${escapeHtml(p.journal)}</span>
                            <span class="project-if">${escapeHtml(p.ifInfo)}</span>
                            <span class="project-year">${escapeHtml(p.year)}</span>
                        </div>
                        <div class="pdf-hint">📄 点击卡片查看PDF全文</div>
                    </div>
                `;
            }
            html += '</div>';
            return html;
        } 
        else if (module === 'urban') {
            let html = '<div class="projects-grid">';
            for (let p of urbanProjects) {
                html += `
                    <div class="project-card" data-pdf="${escapeHtml(p.pdfUrl)}">
                        <div class="project-title">${escapeHtml(p.title)}</div>
                        <div class="project-location">📍 ${escapeHtml(p.location)}</div>
                        <div class="project-desc">${escapeHtml(p.desc)}</div>
                        <div class="pdf-hint">📄 点击卡片查看设计PDF</div>
                    </div>
                `;
            }
            html += '</div>';
            return html;
        }
        else if (module === 'sketch') {
            return '<div class="coming-soon">✍️ 手绘模块 · 建设中</div>';
        }
        else if (module === 'photo') {
            return '<div class="coming-soon">📸 摄影模块 · 建设中</div>';
        }
        return '';
    }

    // --- 弹窗逻辑：点击卡片时，在浮层中打开 PDF.js 查看器，实现流畅的翻页效果---
    function attachCardEvents() {
        const cards = document.querySelectorAll('.project-card');
        const modal = document.getElementById('pdfModal');
        const iframe = document.getElementById('pdfIframe');
        const closeBtn = document.querySelector('.close-btn');

        // 关闭弹窗
        function closeModal() {
            modal.style.display = 'none';
            iframe.src = ''; // 清空 iframe，停止视频/PDF 加载
        }

        closeBtn.onclick = closeModal;
        window.onclick = function(event) {
            if (event.target == modal) {
                closeModal();
            }
        }

        cards.forEach(card => {
            const oldHandler = card._handler;
            if (oldHandler) card.removeEventListener('click', oldHandler);
            const pdfUrl = card.getAttribute('data-pdf');
            const handler = function() {
                if (pdfUrl) {
                    // 使用 PDF.js 的 viewer.html 来打开 PDF，这样用户可以获得完整的翻页、缩放、搜索等功能，阅读体验如翻书一般。
                    // viewer.html 是 PDF.js 官方提供的一个功能齐全的 PDF 阅读器界面。
                    // 这里使用了在线 CDN 托管的 viewer.html，将其嵌入 iframe 中即可。
                    const viewerUrl = `https://cdn.jsdelivr.net/npm/pdfjs-dist@2.16.105/web/viewer.html?file=${encodeURIComponent(pdfUrl)}`;
                    iframe.src = viewerUrl;
                    modal.style.display = 'block';
                } else {
                    alert('PDF路径未配置');
                }
            };
            card.addEventListener('click', handler);
            card._handler = handler;
        });
    }

    // --- 页面切换逻辑（保持不变）---
    function showModule(moduleName) {
        document.getElementById('homePage').style.display = 'none';
        document.getElementById('moduleArea').style.display = 'block';
        document.getElementById('moduleContent').innerHTML = getModuleHTML(moduleName);
        attachCardEvents(); // 重新绑定事件
        const btns = document.querySelectorAll('.module-nav-btn');
        btns.forEach(btn => {
            if (btn.getAttribute('data-module') === moduleName) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    function showHome() {
        document.getElementById('homePage').style.display = 'block';
        document.getElementById('moduleArea').style.display = 'none';
    }

    // 初始化事件绑定
    document.querySelectorAll('.home-card').forEach(card => {
        card.addEventListener('click', () => {
            const module = card.getAttribute('data-module');
            if (module) showModule(module);
        });
    });

    document.querySelectorAll('.module-nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const module = btn.getAttribute('data-module');
            if (module === 'home') showHome();
            else if (module) showModule(module);
        });
    });
</script>
</body>
</html>
