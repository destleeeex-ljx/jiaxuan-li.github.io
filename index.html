<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>李佳轩 · 作品集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            color: #1e2a3a;
            padding: 2rem 1rem;
        }

        /* 容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .name {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #1e2a3a, #2c3e50);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .tagline {
            font-size: 1rem;
            color: #5a6e7c;
            margin-top: 0.5rem;
            border-top: 1px solid #e2e8f0;
            display: inline-block;
            padding-top: 0.5rem;
        }

        /* 导航 Tabs */
        .nav-tabs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 2.5rem;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 0.75rem;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 0.6rem 1.4rem;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #4a5b6e;
            font-family: inherit;
        }
        .tab-btn:hover {
            background: #e9edf2;
            color: #1e2a3a;
        }
        .tab-btn.active {
            background: #1e2a3a;
            color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* 模块内容区 */
        .module-content {
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03), 0 2px 6px rgba(0,0,0,0.05);
            padding: 2rem 1.8rem;
            min-height: 500px;
            transition: all 0.2s;
        }

        /* 论文卡片网格 */
        .papers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 1rem;
        }
        .paper-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.05), 0 0 0 1px #f0f2f5;
            cursor: pointer;
            transition: all 0.25s ease;
            border: 1px solid #edf2f7;
        }
        .paper-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.12);
            border-color: #cbd5e1;
        }
        .paper-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #0f172a;
            line-height: 1.4;
            margin-bottom: 0.75rem;
        }
        .paper-meta {
            font-size: 0.85rem;
            color: #4b5563;
            margin-bottom: 0.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .paper-journal {
            background: #eef2ff;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #1e40af;
        }
        .paper-authors {
            font-size: 0.85rem;
            color: #2d3a46;
            margin: 0.5rem 0;
            font-style: normal;
        }
        .pdf-hint {
            margin-top: 1rem;
            font-size: 0.75rem;
            color: #7f8c8d;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            border-top: 1px solid #ecfdf5;
            padding-top: 0.75rem;
        }
        .pdf-hint span {
            background: #f1f5f9;
            padding: 0.2rem 0.5rem;
            border-radius: 30px;
        }
        .coming-soon {
            text-align: center;
            padding: 3rem 1rem;
            color: #94a3b8;
            font-size: 1.1rem;
        }
        .placeholder-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }
        .placeholder-item {
            background: #f8fafc;
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            flex: 1;
            min-width: 150px;
            color: #475569;
            border: 1px dashed #cbd5e1;
        }

        /* 脚注 */
        .footer {
            text-align: center;
            margin-top: 2.5rem;
            font-size: 0.75rem;
            color: #7c8b9c;
        }

        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }
            .module-content {
                padding: 1.5rem;
            }
            .paper-title {
                font-size: 1.1rem;
            }
            .tab-btn {
                padding: 0.4rem 1rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="name">李佳轩 · Jiaxuan Li</div>
        <div class="tagline">城市规划 | 生态环境 | 设计研究</div>
    </div>

    <!-- 模块导航 -->
    <div class="nav-tabs">
        <button class="tab-btn" data-module="urban">城市设计</button>
        <button class="tab-btn" data-module="sketch">手绘</button>
        <button class="tab-btn active" data-module="paper">论文</button>
        <button class="tab-btn" data-module="photo">摄影</button>
    </div>

    <!-- 动态内容区域 -->
    <div class="module-content" id="moduleContent">
        <!-- 论文模块默认显示 -->
    </div>
    <div class="footer">
        © 李佳轩 · 扫描二维码访问作品集 | 点击论文卡片查看PDF
    </div>
</div>

<script>
    // ------------------------------
    // 论文数据配置 (可轻松修改PDF路径)
    // 请将您的论文PDF文件放在 "papers/" 文件夹下，并修改下方路径
    // 例如: pdf1: "papers/li_ecologica_2024.pdf"
    // ------------------------------
    const papersData = [
        {
            title: "水库消落带植物多样性空间格局预测模型及环境解释 —— 基于XGBoost-SHAP模型框架",
            authors: "刘瑞雪, 李佳轩, 李云",
            journal: "生态学报",
            year: "2024, 44(21): 9652-9669",
            pdfUrl: "papers/reservoir_diversity.pdf",   // 【请替换为实际PDF路径】
            ifactor: "IF 6.5, C核"
        },
        {
            title: "中国立体绿化政策发展与量化评价",
            authors: "刘瑞雪, 李佳轩, 严仙友阳",
            journal: "中国城市林业",
            year: "2025, 23(01): 179-187",
            pdfUrl: "papers/green_policy.pdf",   // 【请替换为实际PDF路径】
            ifactor: "IF 2.1"
        }
    ];

    // 其他模块占位内容 (待扩展)
    const modules = {
        urban: `
            <div class="coming-soon">
                🏙️ 城市设计模块 · 建设中<br>
                <div class="placeholder-grid">
                    <div class="placeholder-item">滨水空间设计<br>(即将呈现)</div>
                    <div class="placeholder-item">TOD综合开发<br>(即将呈现)</div>
                </div>
                <p style="margin-top:1.5rem; font-size:0.85rem;">城市设计作品集 · 效果图与分析图待更新</p>
            </div>
        `,
        sketch: `
            <div class="coming-soon">
                ✍️ 手绘模块 · 速写/建筑/景观手绘<br>
                <div class="placeholder-grid">
                    <div class="placeholder-item">钢笔淡彩</div>
                    <div class="placeholder-item">马克笔表现</div>
                </div>
                <p style="margin-top:1rem; font-size:0.85rem;">手绘作品扫描整理中，敬请期待</p>
            </div>
        `,
        photo: `
            <div class="coming-soon">
                📸 摄影模块 · 城市/自然/人文<br>
                <div class="placeholder-grid">
                    <div class="placeholder-item">城市天际线</div>
                    <div class="placeholder-item">生态纪实</div>
                </div>
                <p style="margin-top:1rem; font-size:0.85rem;">摄影集即将上线</p>
            </div>
        `,
        paper: function() {
            // 动态生成论文卡片
            let cardsHtml = `<div class="papers-grid">`;
            for (let i = 0; i < papersData.length; i++) {
                const p = papersData[i];
                cardsHtml += `
                    <div class="paper-card" data-pdf="${p.pdfUrl}">
                        <div class="paper-title">${escapeHtml(p.title)}</div>
                        <div class="paper-authors">👥 ${escapeHtml(p.authors)}</div>
                        <div class="paper-meta">
                            <span class="paper-journal">📘 ${escapeHtml(p.journal)}</span>
                            <span style="font-size:0.75rem; background:#f1f5f9; padding:0.2rem 0.5rem; border-radius:20px;">${escapeHtml(p.year)}</span>
                        </div>
                        <div class="pdf-hint">
                            <span>📄 点击卡片查看PDF全文</span>
                        </div>
                    </div>
                `;
            }
            cardsHtml += `</div><p style="margin-top:1.5rem; font-size:0.75rem; color:#6c7a8a; text-align:center;">※ PDF文件需置于服务器「papers」文件夹下，可联系作者获取</p>`;
            return cardsHtml;
        }
    };

    // 简单的防XSS
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // 渲染当前模块
    let currentModule = 'paper';

    function renderModule(moduleName) {
        const container = document.getElementById('moduleContent');
        if (!container) return;
        if (moduleName === 'paper') {
            container.innerHTML = modules.paper();
            // 绑定论文卡片点击事件 (动态生成的卡片)
            attachPaperCardEvents();
        } else {
            container.innerHTML = modules[moduleName] || '<div class="coming-soon">模块加载中...</div>';
        }
    }

    // 绑定卡片点击打开PDF
    function attachPaperCardEvents() {
        const cards = document.querySelectorAll('.paper-card');
        cards.forEach(card => {
            // 移除之前的监听器避免重复
            card.removeEventListener('click', card._clickHandler);
            const pdfPath = card.getAttribute('data-pdf');
            const handler = function(e) {
                // 阻止冒泡，避免意外
                e.stopPropagation();
                if (pdfPath && pdfPath !== 'papers/paper1.pdf' && pdfPath !== 'papers/paper2.pdf') {
                    // 用户可能已经替换为真实路径
                    window.open(pdfPath, '_blank');
                } else {
                    // 演示提示，提醒用户替换PDF文件
                    alert('📄 请将论文PDF文件放入 "papers" 文件夹，并修改代码中的 pdfUrl 路径。\n\n当前示例文件：' + pdfPath);
                }
            };
            card.addEventListener('click', handler);
            card._clickHandler = handler;
        });
    }

    // 切换tab样式 + 内容
    function setupTabs() {
        const btns = document.querySelectorAll('.tab-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', function(e) {
                const module = this.getAttribute('data-module');
                if (!module) return;
                // 更新active样式
                btns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentModule = module;
                renderModule(module);
            });
        });
    }

    // 初始化: 默认显示论文模块
    function init() {
        setupTabs();
        renderModule('paper');   // 默认论文模块
    }

    init();
</script>
<!-- 使用说明（替换PDF步骤） -->
<!-- 
    【重要】如何替换真实的论文PDF文件：
    1. 在您的网页部署目录下新建一个文件夹，命名为 "papers"
    2. 将两篇论文PDF分别重命名为 paper1.pdf 和 paper2.pdf (或任意名称)
    3. 打开上方script中的papersData数组，修改对应pdfUrl为实际路径，例如：
       第一篇：pdfUrl: "papers/reservoir_diversity.pdf"
       第二篇：pdfUrl: "papers/green_policy.pdf"
    4. 重新上传所有文件到服务器，确保PDF可被访问。
    5. 若您的PDF放在其他位置（如云盘链接），也可以直接填写完整URL（需支持跨域或直接下载）。
    
    【二维码生成】将本网页上传至任意静态托管（GitHub Pages、七牛云、自己的服务器等），
    获取访问链接后，使用二维码生成工具即可。
-->
